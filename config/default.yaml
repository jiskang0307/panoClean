# ============================================================
# 360° 이미지 사람 제거 파이프라인 — 기본 설정
# ============================================================

# ── 실행 환경 ────────────────────────────────────────────────
device: cuda                    # cuda | cpu
log_level: INFO                 # DEBUG | INFO | WARNING | ERROR

# ── CubeMap 변환 ─────────────────────────────────────────────
cubemap_face_size: 1024         # 각 face의 픽셀 크기 (정사각형)

# ── Segmentation 모델 ────────────────────────────────────────
yolo_model: yolo11x-seg.pt      # ultralytics YOLO11 세그멘테이션 모델
sam2_model: sam2_hiera_large.pt # Meta SAM2 체크포인트
sam2_config: sam2_hiera_l.yaml  # SAM2 모델 설정 파일
person_class_id: 0              # COCO person class index

# ── 마스크 후처리 ─────────────────────────────────────────────
mask_dilate_px: 15              # 마스크 팽창 픽셀 수 (경계 여유)

# ── PHOTOGRAPHER 판별 기준 ────────────────────────────────────
photographer_bbox_bottom_ratio: 0.70   # face 하단 y >= face_h*0.70 이면 촬영자 후보

# ── down face 전용 mask (ellipse OR hull) ─────────────────────
down_face_ellipse:
  cx_ratio:   0.45              # 타원 중심 x (face_w 기준 비율)
  cy_ratio:   0.45              # 타원 중심 y (face_h 기준 비율)
  axes_ratio: 0.38              # 장축/단축 비율 (face 크기 기준)

# ── Down face 처리 방식 ──────────────────────────────────────
down_face_method: blur          # blur | solid | lama
down_blur_kernel: 251           # GaussianBlur 커널 크기 (홀수)
down_blur_passes: 2             # GaussianBlur 적용 횟수
down_blur_feather: 101          # mask 경계 feathering 커널 크기 (홀수)

# ── Feature Matching ────────────────────────────────────────
feature_matcher: none           # none | loftr | superpoint | sift (blur 모드에서 미사용)
loftr_pretrained: outdoor       # outdoor | indoor
sift_n_features: 5000
min_match_count: 10             # 최소 유효 매칭 수
min_inlier_ratio: 0.25          # 이 미만이면 낮은 신뢰도 경고

# ── 소스 선택 ────────────────────────────────────────────────
n_adjacent: 10                  # target 앞뒤 각 n_adjacent//2 장 사용
top_k_sources: 3                # 배경 블렌딩에 사용할 최대 소스 수
source_clean_ratio_min: 0.50    # 촬영자 픽셀 비율이 이 이상인 소스 제외
min_coverage_ratio: 0.85        # 이 비율 이상 채워지면 inpainting 생략

# ── LaMa Inpainting (side face 전용) ─────────────────────────
lama_enabled: false             # blur 통일 모드 — LaMa 미사용
lama_residual_threshold: 0.05   # 잔여 비율 이 미만이면 inpainting 스킵
lama_down_face_size: 256        # down face lama 다운샘플 해상도 (down_face_method=lama 시)
lama_feather_px: 8              # side face 경계 feathering sigma (px)
lama_down_feather_px: 0         # down face feathering — 0=hard composite

# ── 배경 인물 모자이크 ────────────────────────────────────────
mosaic_block_size: 20           # 모자이크 블록 크기 (px)
mosaic_feather_px: 8            # 모자이크 경계 feathering 폭 (px)

# ── 배치 처리 ────────────────────────────────────────────────
batch_size: 4                   # (레거시 — process_batch는 이미지 단위 처리)

# ── 경로 ────────────────────────────────────────────────────
input_dir: ./input
output_dir: ./output
model_dir: ./models             # 다운로드된 모델 가중치 저장 위치

# ── 출력 품질 ────────────────────────────────────────────────
output_jpeg_quality: 95         # JPEG 저장 품질 (0~100)

# ── 디버그 / 시각화 ──────────────────────────────────────────
save_debug_masks: false         # 중간 마스크 저장 여부
save_cubemap_faces: false       # CubeMap face 저장 여부
